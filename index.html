<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="icon" href="imagen/foto.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="calculadora">

        <div class="pantalla">
            <input type="number" id="numero1" name="numero1" required>
            <input type="text" id="operacion" name="operacion" readonly>
            <input type="number" id="numero2" name="numero2" required>
            <p>=</p>
            <input type="number" id="resultado" name="resultado"  readonly>
            
        </div>

        <button class="btn" id="borrar">Reset</button>
        <button class="btn" id="delete">Del</button>
        <button class="btn">/</button>
        <button class="btn">*</button>
        <button class="btn">7</button>
        <button class="btn">8</button>
        <button class="btn">9</button>
        <button class="btn">-</button>
        <button class="btn">4</button>
        <button class="btn">5</button>
        <button class="btn">6</button>
        <button class="btn">+</button>
        <button class="btn">1</button>
        <button class="btn">2</button>
        <button class="btn">3</button>
        <button class="btn" id="igual">=</button>
        <button class="btn" id="cero">0</button>
        <button class="btn">.</button>

    </div>
    <script src="script.js"></script>
</body>
</html>
